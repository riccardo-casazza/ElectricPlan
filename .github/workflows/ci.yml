name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which files changed to determine which jobs to run
  changes:
    runs-on: ubuntu-latest
    outputs:
      ruby: ${{ steps.filter.outputs.ruby }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ruby:
              - '**/*.rb'
              - '**/*.erb'
              - '**/*.yml'
              - 'Gemfile*'
              - 'config/**'
              - 'db/**'
              - 'test/**'
              - 'justfile'
            docker:
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.dockerignore'

  test:
    needs: changes
    if: ${{ needs.changes.outputs.ruby == 'true' }}
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          bundler-cache: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Setup database
        run: just setup

      - name: Run compliance tests
        run: just test

      - name: Run security scan
        run: just security

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.ruby == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          bundler-cache: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run RuboCop
        run: just lint

  build:
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: electric_plan:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
